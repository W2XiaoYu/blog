# GitHub Actions 工作流：构建 VitePress 博客并部署到 GitHub Pages
# 文档参考：https://docs.github.com/en/pages
name: Deploy Pages

# ========== 触发条件 ==========
on:
  # 推送到 main 分支时触发（合并 PR 也会触发）
  push:
    branches: [main]
  # 针对 main 分支的 PR 也会触发（可预览构建是否成功）
  pull_request:
    branches: [main]
  # 支持在 GitHub Actions 页面手动点击 "Run workflow" 触发
  workflow_dispatch:

# ========== 全局环境变量 ==========
env:
  TZ: Asia/Shanghai # 设置时区为上海，影响日志时间和构建中时间相关函数

# ========== 权限设置 ==========
# 最小权限原则：仅授予必要的权限
permissions:
  contents: read   # 读取仓库代码
  pages: write     # 写入 GitHub Pages 资源
  id-token: write  # 用于 OIDC token 认证（部署 Pages 需要）

# ========== 并发控制 ==========
# 同一时间只允许一个 Pages 部署流程运行
# cancel-in-progress: false 表示新的推送不会取消正在进行的部署
concurrency:
  group: pages
  cancel-in-progress: false

# ========== 构建与部署任务 ==========
jobs:
  # -------------------- 第一步：构建 --------------------
  build:
    runs-on: ubuntu-latest

    # 使用 Node.js 22 运行（pnpm 11+ 需要 Node.js 18 以上）
    strategy:
      matrix:
        node-version: [22]

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整 Git 历史，VitePress lastUpdated 功能需要

      # 2. 设置 Node.js 版本
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 3. 安装 pnpm（版本跟随 latest，当前为 pnpm 11.x）
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: latest   # 如需锁定版本可改为具体版本号，如 "11.0.0"
          run_install: false # 不在这里安装依赖，交给下一步处理

      # 4. 安装项目依赖
      # --frozen-lockfile: 严格按 lockfile 安装，不更新依赖，保证 CI 可复现
      # esbuild 构建脚本许可配置在 pnpm-workspace.yaml 的 allowBuilds 中
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. 构建 VitePress 博客，输出到 .vitepress/dist 目录
      - name: Build blog project
        run: |
          pnpm run docs:build

      # 6. 使用 Jekyll 处理静态资源（GitHub Pages 要求）
      # 将 .vitepress/dist 的内容复制到 ./_site
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .vitepress/dist
          destination: ./_site

      # 7. 将 _site 目录打包为 artifact，传递给部署任务
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # -------------------- 第二步：部署 --------------------
  deploy:
    # 部署环境配置
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 部署完成后输出的页面 URL
    runs-on: ubuntu-latest
    needs: build # 等待构建任务完成后才执行
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4